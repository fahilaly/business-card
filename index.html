<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Faisal Alhelali — Digital Card</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="desk">
        <div class="card-scene">
            <div class="card" id="card">
                
                <!-- ══════ FRONT OF DIGITAL CARD ══════ -->
                <div class="card-face card-front">
                    <!-- Physical texture overlay -->
                    <div class="texture"></div>
                    
                    <div class="card-inner portrait-layout">
                        <div class="brand">
                            <h1 class="name">FAISAL A.<br>ALHELALI</h1>
                            <p class="role">MECHATRONICS ENGINEERING<br>STUDENT</p>
                            <p class="tagline">BUILDING THE BRIDGE BETWEEN HARDWARE AND SOFTWARE</p>
                        </div>
                        <div class="contact-details">
                            <!-- LinkedIn Button -->
                            <a href="https://www.linkedin.com/in/falhilaly/" target="_blank" class="standout-link linkedin-theme">
                                <div class="icon-wrapper">
                                    <i data-lucide="linkedin"></i>
                                </div>
                                <span class="link-label">LinkedIn</span>
                            </a>

                            <!-- Phone Button -->
                            <a href="tel:+966533301766" class="standout-link phone-theme">
                                <div class="icon-wrapper">
                                    <i data-lucide="phone"></i>
                                </div>
                                <span class="link-label">+966 533 301 766</span>
                            </a>

                            <!-- Email Button -->
                            <a href="mailto:Fahilaly@gmail.com" class="standout-link email-theme">
                                <div class="icon-wrapper">
                                    <i data-lucide="mail"></i>
                                </div>
                                <span class="link-label">Gmail</span>
                            </a>

                            <!-- GitHub Button -->
                            <a href="https://github.com/fahilaly" target="_blank" class="standout-link github-theme">
                                <div class="icon-wrapper">
                                    <i data-lucide="github"></i>
                                </div>
                                <span class="link-label">GitHub</span>
                            </a>

                        </div>
                    </div>
                </div>

                <!-- ══════ BACK OF DIGITAL CARD ══════ -->
                <div class="card-face card-back">
                    <div class="texture"></div>
                    
                    <div class="card-inner portrait-layout">
                        
                        <div class="back-header">
                            <div class="monogram">F.A.</div>
                            <h2 class="scan-text">SCAN FOR DIGITAL CARD</h2>
                            <p class="scan-subtext">Contact & CV</p>
                        </div>

                        <div class="qr-container">
                            <img 
                                src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://fahilaly.github.io/&bgcolor=ffffff&color=111111&margin=0" 
                                alt="Scan code"
                                class="qr-code"
                            >
                        </div>
                        
                        <div class="action-buttons">
                            <a href="./assets/CV.pdf" class="save-contact">
                                <i data-lucide="file-text" class="icon-small"></i> VIEW CV
                            </a>
                            <a href="./assets/faisal_alhelali.vcf" class="save-contact" download>
                                <i data-lucide="download" class="icon-small"></i> SAVE CONTACT
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
        
        <p class="instruction">Click anywhere on the card to flip</p>
    </div>

    <!-- Toast for copying actions -->
    <div class="toast" id="toast"></div>

    <script src="js/script.js"></script>
</body>
</html>
