<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Faisal Alhelali — Digital Card</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="desk">
        <div class="card-scene">
            <div class="card" id="card">
                
                <!-- ══════ FRONT OF DIGITAL CARD ══════ -->
                <div class="card-face card-front">
                    <!-- Physical texture overlay -->
                    <div class="texture"></div>
                    
                    <div class="card-inner portrait-layout">
                        <div class="brand">
                            <h1 class="name">FAISAL A.<br>ALHELALI</h1>
                            <p class="role">MECHATRONICS ENGINEERING<br>STUDENT</p>
                            <p class="tagline">BUILDING THE BRIDGE BETWEEN HARDWARE AND SOFTWARE</p>
                        </div>
                        
                        <div class="contact-details">
                                                       <!-- LinkedIn Button -->
                            <a href="https://www.linkedin.com/in/falhilaly/" target="_blank" class="standout-link linkedin-theme">
                                <div class="icon-wrapper">
                                    <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
                                </div>
                                <span class="link-label">falhilaly</span>
                            </a>

                            <!-- Phone Button -->
                            <a href="tel:+966533301766" class="standout-link phone-theme">
                                <div class="icon-wrapper">
                                    <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M20 22.621l-3.521-6.795c-.008.004-1.974.97-2.064 1.011-2.24 1.086-6.799-7.82-4.509-8.954.058-.028 2.022-1.004 2.022-1.004l-3.582-6.879s-2.021 1.034-2.115 1.078c-3.121 1.439-3.235 6.43-.591 10.915 2.661 4.517 7.026 8.361 10.211 8.706.145.015 2.15-.996 2.15-.996z"/></svg>
                                </div>
                                <span class="link-label">+966 533 301 766</span>
                            </a>

                            <!-- Gmail Button -->
                            <a href="mailto:Fahilaly@gmail.com" class="standout-link email-theme">
                                <div class="icon-wrapper">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 010 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L12 9.573l8.073-6.08c1.618-1.214 3.927-.059 3.927 1.964z" fill="#EA4335"/></svg>
                                </div>
                                <span class="link-label">Fahilaly@gmail.com</span>
                            </a>

                            <!-- GitHub link -->
                            <a href="https://github.com/fahilaly" target="_blank" class="standout-link github-theme">
                                <div class="icon-wrapper">
                                    <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                                </div>
                                <span class="link-label">fahilaly</span>
                            </a>

                        </div>
                    </div>
                </div>

                <!-- ══════ BACK OF DIGITAL CARD ══════ -->
                <div class="card-face card-back">
                    <div class="texture"></div>
                    
                    <div class="card-inner portrait-layout">
                        
                        <div class="back-header">
                            <div class="monogram">F.A.</div>
                            <h2 class="scan-text">SCAN FOR DIGITAL CARD</h2>
                            <p class="scan-subtext">Contact & CV</p>
                        </div>

                        <div class="qr-container">
                            <img 
                                src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://fahilaly.github.io/&bgcolor=ffffff&color=111111&margin=0" 
                                alt="Scan code"
                                class="qr-code"
                            >
                        </div>
                        
                        <div class="action-buttons">
                            <a href="./assets/CV.pdf" class="save-contact">
                                <i data-lucide="file-text" class="icon-small"></i> VIEW CV
                            </a>
                            <a href="./assets/faisal_alhelali.vcf" class="save-contact" download>
                                <i data-lucide="download" class="icon-small"></i> SAVE CONTACT
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
        
        <p class="instruction">Click anywhere on the card to flip</p>
    </div>

    <!-- Toast for copying actions -->
    <div class="toast" id="toast"></div>

    <script src="js/script.js"></script>
</body>
</html>
