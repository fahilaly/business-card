<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Faisal Alhelali — Digital Card</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="desk">
        <div class="card-scene">
            <div class="card" id="card">
                
                <!-- ══════ FRONT OF DIGITAL CARD ══════ -->
                <div class="card-face card-front">
                    <!-- Physical texture overlay -->
                    <div class="texture"></div>
                    
                    <div class="card-inner portrait-layout">
                        <div class="brand">
                            <h1 class="name">FAISAL A.<br>ALHELALI</h1>
                            <p class="role">MECHATRONICS ENGINEERING<br>STUDENT</p>
                            <p class="tagline">BUILDING THE BRIDGE BETWEEN HARDWARE AND SOFTWARE</p>
                        </div>
                        
                        <div                            <!-- LinkedIn Button -->
                            <a href="https://www.linkedin.com/in/falhilaly/" target="_blank" class="standout-link linkedin-theme">
                                <div class="icon-wrapper">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" fill="#0077b5"/></svg>
                                </div>
                                <span class="link-label">LinkedIn</span>
                            </a>

                            <!-- Phone Button (iPhone Style) -->
                            <a href="tel:+966533301766" class="standout-link phone-theme">
                                <div class="icon-wrapper">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect width="24" height="24" rx="5" fill="#28D146"/><path d="M17.477 18c-4.381 0-8.558-3.533-11.164-7.765C4.218 7.042 4.53 3.41 6.041 1.898c1.111-1.111 2.639-.419 3.289.228l1.645 1.645c.625.625.736 1.611.253 2.342l-1.015 1.522c-.163.245-.137.565.063.78 1.066 1.151 2.827 2.912 3.979 3.979.215.2.536.226.78.063l1.522-1.015c.731-.483 1.717-.372 2.342.253l1.645 1.645c.647.647 1.339 2.179.228 3.289-.847.847-2.873 1.881-5.05 1.881z" fill="white"/></svg>
                                </div>
                                <span class="link-label">+966 533 301 766</span>
                            </a>

                            <!-- Gmail Button (Official) -->
                            <a href="mailto:Fahilaly@gmail.com" class="standout-link email-theme">
                                <div class="icon-wrapper">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 010 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L12 9.573l8.073-6.08c1.618-1.214 3.927-.059 3.927 1.964z" fill="#EA4335"/></svg>
                                </div>
                                <span class="link-label">Gmail</span>
                            </a>

                            <!-- GitHub Button (Official Circle) -->
                            <a href="https://github.com/fahilaly" target="_blank" class="standout-link github-theme">
                                <div class="icon-wrapper">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.372.79 1.102.79 2.222v3.293c0 .319.228.694.825.576C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12" fill="#181717"/></svg>
                                </div>
                                <span class="link-label">GitHub</span>
                            </a>

                        </div>
                    </div>
                </div>

                <!-- ══════ BACK OF DIGITAL CARD ══════ -->
                <div class="card-face card-back">
                    <div class="texture"></div>
                    
                    <div class="card-inner portrait-layout">
                        
                        <div class="back-header">
                            <div class="monogram">F.A.</div>
                            <h2 class="scan-text">SCAN FOR DIGITAL CARD</h2>
                            <p class="scan-subtext">Contact & CV</p>
                        </div>

                        <div class="qr-container">
                            <img 
                                src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=https://fahilaly.github.io/&bgcolor=ffffff&color=111111&margin=0" 
                                alt="Scan code"
                                class="qr-code"
                            >
                        </div>
                        
                        <div class="action-buttons">
                            <a href="./assets/CV.pdf" class="save-contact">
                                <i data-lucide="file-text" class="icon-small"></i> VIEW CV
                            </a>
                            <a href="./assets/faisal_alhelali.vcf" class="save-contact" download>
                                <i data-lucide="download" class="icon-small"></i> SAVE CONTACT
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
        
        <p class="instruction">Click anywhere on the card to flip</p>
    </div>

    <!-- Toast for copying actions -->
    <div class="toast" id="toast"></div>

    <script src="js/script.js"></script>
</body>
</html>
